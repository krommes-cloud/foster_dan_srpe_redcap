<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foster RPE</title>
  <style>
    :root {
      --line-x: 44px;
      --line-w: 4px;
      --tick-half: 16px;

      --panel-w: 520px;
      --text: #111;

      --hit-left: 14px;
      --hit-width: 210px;

      --text-left: 62px;

      /* Lille buffer så første og sidste anker ikke bliver klippet */
      --top-pad: 10px;
      --bottom-pad: 10px;

      /* Samlet højde skal stadig passe i REDCap embed */
      --scale-h: 450px;
    }

    * {
      box-sizing: border-box;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      padding: 0;
    }

    .panel {
      width: 100%;
      max-width: var(--panel-w);
      margin: 0 auto;
      background: #fff;
      padding: 0;
    }

    .scale-wrap {
      position: relative;
      height: var(--scale-h);
      user-select: none;
      overflow: hidden;
    }

    .line {
      position: absolute;
      left: var(--line-x);
      top: var(--top-pad);
      bottom: var(--bottom-pad);
      width: var(--line-w);
      background: #222;
      transform: translateX(calc(var(--line-w) / -2));
      pointer-events: none;
    }

    .line::before,
    .line::after {
      content: "";
      position: absolute;
      left: calc(var(--tick-half) * -1);
      width: calc(var(--tick-half) * 2);
      height: 3px;
      background: #222;
    }

    .line::before {
      top: 0;
    }

    .line::after {
      bottom: 0;
    }

    .segments {
      position: absolute;
      left: var(--hit-left);
      top: var(--top-pad);
      width: var(--hit-width);
      height: calc(100% - var(--top-pad) - var(--bottom-pad));
      display: grid;
      grid-template-rows: repeat(101, minmax(0, 1fr));
    }

    .segment {
      position: relative;
      display: block;
      width: 100%;
      min-height: 0;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      text-align: left;
      color: inherit;
    }

    .segment-text {
      position: absolute;
      left: calc(var(--text-left) - var(--hit-left));
      top: 50%;
      transform: translateY(-50%);
      font-size: 0;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .segment.anchor .segment-text {
      font-size: 15px;
      line-height: 1;
      font-weight: 400;
    }

    .marker {
      position: absolute;
      left: var(--line-x);
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border-radius: 50%;
      background: #111;
      display: none;
      pointer-events: none;
    }

    .checkmark {
      position: absolute;
      left: 2px;
      top: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1c8c3a;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .checkmark.show {
      display: flex;
    }

    .status {
      display: none;
    }

    @media (max-width: 600px) {
      :root {
        --line-x: 38px;
        --tick-half: 14px;
        --hit-left: 10px;
        --hit-width: 170px;
        --text-left: 54px;
        --scale-h: 450px;
        --top-pad: 10px;
        --bottom-pad: 10px;
      }

      .segment.anchor .segment-text {
        font-size: 12px;
      }

      .checkmark {
        left: 0;
        top: 6px;
        width: 24px;
        height: 24px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="scale-wrap" aria-label="Foster RPE 0 til 100">
      <div class="checkmark" id="checkmark" aria-hidden="true">✓</div>
      <div class="line" aria-hidden="true"></div>
      <div class="segments" id="segments"></div>
      <div class="marker" id="marker" aria-hidden="true"></div>
    </div>

    <div class="status" id="status"></div>
  </main>

  <script>
    (function () {
      const anchors = new Map([
        [0, 'Ikke anstrengende'],
        [10, 'Ekstremt nem'],
        [20, 'Nem'],
        [30, 'Moderat'],
        [40, 'Lidt hård'],
        [50, 'Hård'],
        [70, 'Meget hård'],
        [100, 'Maksimal']
      ]);

      const params = new URLSearchParams(window.location.search);
      const context = {
        record: params.get('record') || '',
        event_name: params.get('event') || '',
        instance: params.get('instance') || '',
        repeat_instrument: params.get('repeat_instrument') || '',
        field: params.get('field') || 'srpe_0100'
      };

      const segments = document.getElementById('segments');
      const marker = document.getElementById('marker');
      const status = document.getElementById('status');
      const checkmark = document.getElementById('checkmark');

      function setStatus(message, kind) {
        status.textContent = message || '';
        status.className = 'status' + (kind ? ' ' + kind : '');
      }

      function saveValue(value) {
        return fetch('/.netlify/functions/save-rpe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            record: context.record,
            event_name: context.event_name,
            instance: context.instance,
            repeat_instrument: context.repeat_instrument,
            field: context.field,
            value: value
          })
        }).then(async (res) => {
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(body.error || 'Kunne ikke gemme værdien.');
          }
          return body;
        });
      }

      for (let value = 0; value <= 100; value += 1) {
        const seg = document.createElement('button');
        seg.type = 'button';
        seg.className = 'segment' + (anchors.has(value) ? ' anchor' : '');
        seg.dataset.value = String(value);
        seg.setAttribute('aria-label', anchors.get(value) || String(value));

        const text = document.createElement('span');
        text.className = 'segment-text';
        text.textContent = anchors.get(value) || '';
        seg.appendChild(text);

        seg.addEventListener('click', async () => {
          const rect = seg.getBoundingClientRect();
          const parentRect = segments.getBoundingClientRect();
          const centerY = rect.top - parentRect.top + rect.height / 2;

          marker.style.top = (centerY + parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--top-pad') || 0)) + 'px';
          marker.style.display = 'block';

          try {
            await saveValue(value);
            checkmark.classList.add('show');
            setStatus('Registreret.', 'ok');
          } catch (err) {
            checkmark.classList.remove('show');
            setStatus(err.message || 'Kunne ikke gemme værdien.', 'error');
          }
        });

        segments.appendChild(seg);
      }

      if (!context.record) {
        setStatus('Manglende record-kontekst i URL.', 'error');
      }
    })();
  </script>
</body>
</html>
