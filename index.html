<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foster RPE</title>
  <style>
    :root {
      --text: #111;
      --viewport-h: 450px;

      --design-w: 220px;
      --design-h: 450px;

      --line-x: 30px;
      --line-w: 4px;
      --tick-half: 14px;

      --top-pad: 12px;
      --bottom-pad: 12px;

      --hit-left: 0px;
      --hit-width: 190px;

      --text-left: 44px;

      --anchor-font: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      --anchor-size: 12px;

      --top-anchor-shift: 4px;
      --bottom-anchor-shift: -4px;

      --check-size: 30px;
      --check-gap: 8px;
      --status-width: 110px;
      --status-gap: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .viewport {
      width: 100%;
      height: var(--viewport-h);
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    .stage {
      position: absolute;
      top: 0;
      left: 50%;
      width: var(--design-w);
      height: var(--design-h);
      transform-origin: top center;
      transform: translateX(-50%) scale(1);
    }

    .scale-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      user-select: none;
      overflow: visible;
    }

    .line {
      position: absolute;
      left: var(--line-x);
      top: var(--top-pad);
      bottom: var(--bottom-pad);
      width: var(--line-w);
      background: #222;
      transform: translateX(calc(var(--line-w) / -2));
      pointer-events: none;
      z-index: 1;
    }

    .line::before,
    .line::after {
      content: "";
      position: absolute;
      left: calc(var(--tick-half) * -1);
      width: calc(var(--tick-half) * 2);
      height: 3px;
      background: #222;
    }

    .line::before {
      top: 0;
    }

    .line::after {
      bottom: 0;
    }

    .segments {
      position: absolute;
      left: var(--hit-left);
      top: var(--top-pad);
      width: var(--hit-width);
      height: calc(100% - var(--top-pad) - var(--bottom-pad));
      display: grid;
      grid-template-rows: repeat(101, minmax(0, 1fr));
      z-index: 5;
    }

    .segment {
      position: relative;
      display: block;
      width: 100%;
      min-height: 0;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      text-align: left;
      color: inherit;
    }

    .segment-text {
      position: absolute;
      left: calc(var(--text-left) - var(--hit-left));
      top: 50%;
      transform: translateY(-50%);
      font-size: 0;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .segment.anchor .segment-text {
      font-family: var(--anchor-font);
      font-size: var(--anchor-size);
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0;
    }

    .segment[data-value="0"] .segment-text {
      transform: translateY(calc(-50% + var(--top-anchor-shift)));
    }

    .segment[data-value="100"] .segment-text {
      transform: translateY(calc(-50% + var(--bottom-anchor-shift)));
    }

    .marker {
      position: absolute;
      left: var(--line-x);
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border-radius: 50%;
      background: #111;
      display: none;
      pointer-events: none;
      z-index: 15;
    }

    .success-box {
      position: absolute;
      left: calc(var(--line-x) - var(--check-size) - var(--check-gap));
      top: 50%;
      transform: translateY(-50%);
      width: var(--check-size);
      height: var(--check-size);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .success-box.show {
      display: flex;
    }

    .checkmark {
      width: var(--check-size);
      height: var(--check-size);
      border-radius: 50%;
      background: #1c8c3a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    .status {
      position: absolute;
      left: calc(
        var(--line-x) - var(--check-size) - var(--check-gap) - var(--status-width) - var(--status-gap)
      );
      top: 50%;
      transform: translateY(-50%);
      width: var(--status-width);
      min-height: 18px;
      font-size: 11px;
      line-height: 1.15;
      color: #8b0000;
      text-align: right;
      white-space: normal;
      z-index: 25;
      pointer-events: none;
    }

    .status.ok {
      color: #1c5e20;
    }

    .status.error {
      color: #8b0000;
    }

    @media (min-width: 601px) {
      :root {
        --design-w: 240px;
        --line-x: 34px;
        --tick-half: 14px;
        --hit-left: 0px;
        --hit-width: 205px;
        --text-left: 50px;
        --anchor-size: 13px;

        --check-size: 22px;
        --check-gap: 8px;
        --status-width: 120px;
        --status-gap: 10px;
      }

      .status {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage" id="stage">
      <main class="scale-wrap" aria-label="Foster RPE 0 til 100">
        <div class="success-box" id="successBox" aria-hidden="true">
          <div class="checkmark">✓</div>
        </div>

        <div class="line" aria-hidden="true"></div>
        <div class="segments" id="segments"></div>
        <div class="marker" id="marker" aria-hidden="true"></div>
        <div class="status" id="status"></div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const anchors = new Map([
        [0, 'Ikke anstrengende'],
        [10, 'Ekstremt nem'],
        [20, 'Nem'],
        [30, 'Moderat'],
        [40, 'Lidt hård'],
        [50, 'Hård'],
        [70, 'Meget hård'],
        [100, 'Maksimal']
      ]);

      const params = new URLSearchParams(window.location.search);
      const context = {
        record: params.get('record') || '',
        event_name: params.get('event') || '',
        instance: params.get('instance') || '',
        repeat_instrument: params.get('repeat_instrument') || '',
        field: params.get('field') || '',
        complete_field: params.get('complete_field') || ''
      };

      const stage = document.getElementById('stage');
      const segments = document.getElementById('segments');
      const marker = document.getElementById('marker');
      const status = document.getElementById('status');
      const successBox = document.getElementById('successBox');

      function setStatus(message, kind) {
        status.textContent = message || '';
        status.className = 'status' + (kind ? ' ' + kind : '');
      }

      async function saveValue(value) {
        const response = await fetch('/.netlify/functions/save-rpe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            record: context.record,
            event_name: context.event_name,
            instance: context.instance,
            repeat_instrument: context.repeat_instrument,
            field: context.field,
            value: value,
            complete_field: context.complete_field
          })
        });

        const body = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(body.details || body.error || 'Kunne ikke gemme værdien.');
        }

        return body;
      }

      function fitStage() {
        const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
        const designWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--design-w'));
        const maxScale = 1;
        const minScale = 0.78;

        const availableWidth = Math.max(180, viewportWidth - 4);
        let scale = availableWidth / designWidth;

        if (scale > maxScale) scale = maxScale;
        if (scale < minScale) scale = minScale;

        stage.style.transform = `translateX(-50%) scale(${scale})`;
      }

      function tryCloseWindow() {
        setTimeout(() => {
          try {
            window.close();
          } catch (e) {}

          setTimeout(() => {
            try {
              if (window.history.length > 1) {
                window.history.back();
              }
            } catch (e) {}
          }, 150);
        }, 1000);
      }

      for (let value = 0; value <= 100; value += 1) {
        const seg = document.createElement('button');
        seg.type = 'button';
        seg.className = 'segment' + (anchors.has(value) ? ' anchor' : '');
        seg.dataset.value = String(value);
        seg.setAttribute('aria-label', anchors.get(value) || String(value));

        const text = document.createElement('span');
        text.className = 'segment-text';
        text.textContent = anchors.get(value) || '';
        seg.appendChild(text);

        seg.addEventListener('click', async () => {
          successBox.classList.remove('show');
          setStatus('');
          marker.style.display = 'none';

          const rect = seg.getBoundingClientRect();
          const parentRect = segments.getBoundingClientRect();
          const topPad = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--top-pad')) || 0;
          const centerY = rect.top - parentRect.top + rect.height / 2;

          marker.style.top = (centerY + topPad) + 'px';
          marker.style.display = 'block';

          try {
            await saveValue(value);
            marker.style.display = 'none';
            successBox.classList.add('show');
            setStatus('Registreret.', 'ok');
            tryCloseWindow();
          } catch (err) {
            setStatus(err.message || 'Kunne ikke gemme værdien.', 'error');
          }
        });

        segments.appendChild(seg);
      }

      fitStage();
      window.addEventListener('resize', fitStage);

      if (!context.record || !context.event_name || !context.instance || !context.repeat_instrument || !context.field) {
        setStatus('Manglende kontekst i URL.', 'error');
      }
    })();
  </script>
</body>
</html>
