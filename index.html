<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hvordan var din træning?</title>
  <style>
    :root {
      --line-x: 56px;
      --line-w: 4px;
      --tick-half: 20px;
      --panel-w: 520px;
      --panel-pad: 28px;
      --panel-bg: #fff;
      --panel-border: #d0d0d0;
      --text: #111;
      --muted: #555;

      /* klikområde starter ved yderste venstre punkt på tværstregen */
      --hit-left: calc(var(--line-x) - var(--tick-half));

      /* tekst starter et stykke til højre for linjen */
      --text-left: 52px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .panel {
      width: 100%;
      max-width: var(--panel-w);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: var(--panel-pad);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.15;
      text-align: center;
    }

    .scale-wrap {
      position: relative;
      min-height: 640px;
      user-select: none;
    }

    .line {
      position: absolute;
      left: var(--line-x);
      top: 0;
      bottom: 0;
      width: var(--line-w);
      background: #222;
      transform: translateX(calc(var(--line-w) / -2));
      pointer-events: none;
    }

    /* tværstreger i top og bund, på begge sider af linjen */
    .line::before,
    .line::after {
      content: "";
      position: absolute;
      left: calc(var(--tick-half) * -1);
      width: calc(var(--tick-half) * 2);
      height: 3px;
      background: #222;
    }

    .line::before { top: 0; }
    .line::after { bottom: 0; }

    .segments {
      position: relative;
      display: grid;
      grid-template-rows: repeat(101, 1fr);
      min-height: 640px;

      /* klikområde går fra venstre yderpunkt på tværstregen */
      margin-left: var(--hit-left);
      width: calc(100% - var(--hit-left));
    }

    .segment {
      position: relative;
      display: block;
      width: 100%;
      min-height: 6px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      text-align: left;
    }

    .segment-text {
      position: absolute;
      left: var(--text-left);
      top: 50%;
      transform: translateY(-50%);
      font-size: 0;
      line-height: 1.2;
      white-space: nowrap;
    }

    .segment.anchor .segment-text {
      font-size: clamp(16px, 2.5vw, 22px);
    }

    .marker {
      position: absolute;
      left: var(--line-x);
      width: 12px;
      height: 12px;
      margin-left: -6px;
      margin-top: -6px;
      border-radius: 50%;
      background: #111;
      display: none;
      pointer-events: none;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
      color: #222;
    }

    .status:empty {
      display: none;
    }

    .status.error { color: #8b0000; }
    .status.ok { color: #1c5e20; }

    @media (max-width: 600px) {
      :root {
        --line-x: 44px;
        --tick-half: 16px;
        --hit-left: calc(var(--line-x) - var(--tick-half));
        --text-left: 44px;
      }

      .panel { padding: 20px; }
      .scale-wrap { min-height: 560px; }
      .segments { min-height: 560px; }
      .segment { min-height: 5px; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Hvordan var din træning?</h1>

    <div class="scale-wrap" aria-label="Foster RPE 0 til 100">
      <div class="line" aria-hidden="true"></div>
      <div class="segments" id="segments"></div>
      <div class="marker" id="marker" aria-hidden="true"></div>
    </div>

    <div class="status" id="status"></div>
  </main>

  <script>
    (function () {
      const anchors = new Map([
        [0, 'Ikke anstrengende'],
        [10, 'Ekstremt nem'],
        [20, 'Nem'],
        [30, 'Moderat'],
        [40, 'Lidt hård'],
        [50, 'Hård'],
        [70, 'Meget hård'],
        [100, 'Maksimal']
      ]);

      const params = new URLSearchParams(window.location.search);
      const context = {
        record: params.get('record') || '',
        event_name: params.get('event') || '',
        instance: params.get('instance') || '',
        repeat_instrument: params.get('repeat_instrument') || '',
        field: params.get('field') || 'srpe_0100'
      };

      const segments = document.getElementById('segments');
      const marker = document.getElementById('marker');
      const status = document.getElementById('status');

      function setStatus(message, kind) {
        status.textContent = message || '';
        status.className = 'status' + (kind ? ' ' + kind : '');
      }

      function saveValue(value) {
        return fetch('/.netlify/functions/save-rpe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            record: context.record,
            event_name: context.event_name,
            instance: context.instance,
            repeat_instrument: context.repeat_instrument,
            field: context.field,
            value: value
          })
        }).then(async (res) => {
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(body.error || 'Kunne ikke gemme værdien.');
          }
          return body;
        });
      }

      for (let value = 0; value <= 100; value += 1) {
        const seg = document.createElement('button');
        seg.type = 'button';
        seg.className = 'segment' + (anchors.has(value) ? ' anchor' : '');
        seg.dataset.value = String(value);
        seg.setAttribute('aria-label', anchors.get(value) || String(value));

        const text = document.createElement('span');
        text.className = 'segment-text';
        text.textContent = anchors.get(value) || '';
        seg.appendChild(text);

        seg.addEventListener('click', async () => {
          const rect = seg.getBoundingClientRect();
          const parentRect = segments.getBoundingClientRect();
          const centerY = rect.top - parentRect.top + rect.height / 2;

          marker.style.top = centerY + 'px';
          marker.style.display = 'block';

          try {
            await saveValue(value);
            setStatus('Tak for din besvarelse, den er registreret.', 'ok');
          } catch (err) {
            setStatus(err.message || 'Kunne ikke gemme værdien.', 'error');
          }
        });

        segments.appendChild(seg);
      }

      if (!context.record) {
        setStatus('Manglende record-kontekst i URL.', 'error');
      }
    })();
  </script>
</body>
</html>
